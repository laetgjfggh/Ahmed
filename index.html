<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* إعدادات الشاشة الأساسية */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* حاوية التحميل (المنجل) */
        #loader-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .deadline-img {
            width: 100%;
            display: block;
        }

        /* شريط التحميل الأحمر - مضبوط بالملي فوق الخط الأبيض */
        .progress-bar {
            position: absolute;
            bottom: 46.5%; /* يركب فوق الخط الأبيض تماماً */
            left: 14%;    /* يبدأ من خلف المنجل */
            height: 10px; /* خمل الخط */
            background-color: #ff0000;
            width: 0%;
            box-shadow: 0 0 15px #ff0000;
            animation: loadProgress 6s linear forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 72%; } /* يتوقف عند رأس الشخص */
        }

        .status-text {
            color: #fff;
            margin-top: 15px;
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* شاشة الإنستغرام النهائية */
        #final-screen {
            display: none; /* مخفية في البداية */
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0; left: 0;
            background-color: #000;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        #final-screen img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* تظهر كاملة بدون قص */
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <img src="https://i.postimg.cc/d0rf162b/9af4468b8eb47a657abcae2b2a516e06.jpg" class="deadline-img">
        <div class="progress-bar"></div>
        <div class="status-text">DEADLine</div>
    </div>

    <div id="final-screen">
        <img src="https://i.postimg.cc/Jz9gMvkJ/Screenshot-20260414-194203-Insta-Gold.jpg">
    </div>

    <script>
        // دالة التبديل التلقائي
        window.onload = function() {
            // ننتظر 6 ثواني (نفس وقت الأنيميشن) ثم نبدل الشاشات
            setTimeout(function() {
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('final-screen').style.display = 'flex';
            }, 6000);
        };
    </script>
</body>
</html>
